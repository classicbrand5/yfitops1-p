name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ----- Auto‑update lockfile (if needed) -----
      - name: Install dependencies (regenerates lockfile)
        run: npm install

      - name: Commit updated lockfile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update package-lock.json [skip ci]"
          file_pattern: "package-lock.json"
          commit_options: '--no-verify'
          skip_dirty_check: false
          # Only commits if package-lock.json changed

      # ----- Build and deploy -----
      - name: Build the project
        run: npm run build
        # dist/ now contains the built app and public/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: yfitops1          # Must exist in Cloudflare Pages
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}