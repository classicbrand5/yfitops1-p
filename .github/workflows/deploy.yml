name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]   # change to 'master' if your default branch is 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the lockfile update back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (allow lockfile update)
        run: npm install

      - name: Commit updated lockfile if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          if git diff --staged --quiet; then
            echo "No lockfile changes, skipping commit."
          else
            git commit -m "Update package-lock.json [skip ci]"
            git push
          fi

      - name: Build the project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: yfitops1
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
