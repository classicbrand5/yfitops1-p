name: Touch all files to force sync

on:
  workflow_dispatch:

jobs:
  touch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Touch every file
        run: |
          find . -type f \( ! -path './.git/*' \) -exec touch {} \;

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh all file timestamps to sync with OnSpace AI" || echo "No changes to commit"
          git push origin HEAD:main
