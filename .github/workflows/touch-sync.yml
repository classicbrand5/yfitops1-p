name: Append invisible space to force sync

on:
  workflow_dispatch:

jobs:
  refresh-all-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Append a zero-width space to every tracked file
        run: |
          git ls-files -z | while IFS= read -r -d '' f; do
            if [ -f "$f" ]; then
              printf '#no-to-no' >> "$f"
            fi
          done

      - name: Commit and push to OnSpace collective repo
        env:
          PAT: ${{ secrets.DEPLOY_TEST_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add collective https://x-access-token:${PAT}@github.com/classicbrand5/YFitOps-Collective.git
          git add -A
          git commit -m "sync: append zwsp to all tracked files to trigger OnSpace import" || echo "No changes to commit"
          git push collective --force HEAD:main
