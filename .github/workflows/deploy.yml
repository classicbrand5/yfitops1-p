name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]   # change to 'master' if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # or 22, depending on your project
          cache: 'npm'            # enables faster installs

      - name: Install dependencies
        run: npm install               # uses the committed lockfile for reproducibility

      - name: Build the project
        run: npm run build
        # After this, the 'dist' folder contains the built files and public/_headers

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: yfitops1          # must match the project name you created on Cloudflare
          directory: dist                      # the folder to deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
