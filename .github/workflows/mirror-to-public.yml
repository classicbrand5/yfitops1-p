name: Mirror to public repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest

    # Grant write permission to contents (needed for the private repo checkout itself)
    permissions:
      contents: read

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # ← THIS IS THE KEY FIX

      - name: Push to public mirror
        env:
          PAT: ${{ secrets.DEPLOY_KEY }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add public https://x-access-token:${PAT}@github.com/classicbrand5/yfitops1-p.git
          git push public --force --all
          git push public --force --tags
